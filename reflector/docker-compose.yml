version: "3.9"

networks:
  darpan-net:
    external: true
    name: darpan-net

services:
  cowrie-reflector-01:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: darpan_cowrie-reflector-01
    image: darpan/cowrie-reflector:latest
    restart: always
    hostname: cowrie-reflector-01

    labels:
      com.darpan: "true"
      com.darpan.role: "reflector"
      com.darpan.node: "reflector-01"

    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - COWRIE_LOG_FORMAT=json
      - DARPAN_NODE_ID=reflector-01

    ports:
      - "2222:2222"
      - "2223:2223"

    volumes:
      # Polymorphic honeyfs — read-only inside container
      - /opt/darpan/reflector/honeyfs:/cowrie/honeyfs:ro
      # Cowrie config (allows live config reload)
      - /opt/darpan/reflector/cowrie.cfg:/cowrie/etc/cowrie.cfg:ro
      - /opt/darpan/reflector/userdb.txt:/cowrie/etc/userdb.txt:ro
      # Log output to host for Filebeat pickup
      - /opt/darpan/logs/cowrie:/cowrie/var/log/cowrie
      # Attacker-uploaded malware samples
      - /opt/darpan/intel/malware_samples:/cowrie/var/lib/cowrie/downloads
      # TTY session recordings
      - /opt/darpan/logs/tty:/cowrie/var/lib/cowrie/tty

    networks:
      darpan-net:
        ipv4_address: 172.20.0.10

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 128M

    security_opt:
      - no-new-privileges:true

    read_only: false

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    healthcheck:
      test: ["CMD", "pgrep", "-f", "cowrie"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
