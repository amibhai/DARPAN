# =============================================================================
# DARPAN Cowrie Configuration
# Persona: Ubuntu 22.04 LTS Production Server
# =============================================================================

[honeypot]
# Fake hostname presented to attackers
hostname = ubuntu-prod-srv-01

# Fake operating system details
kernel_version = 5.15.0-88-generic
kernel_build_string = #98-Ubuntu SMP Mon Oct 2 15:18:56 UTC 2023
hardware_platform = x86_64
operating_system = GNU/Linux

# Fake uptime (seconds) — 47 days
uptime = 4060800

# Log format
log_path = /cowrie/var/log/cowrie

# Honeyfs path — our polymorphic fake filesystem
contents_path = /cowrie/honeyfs

# Timezone
timezone = America/New_York

# Fake filesystem interactions
download_path = /cowrie/var/lib/cowrie/downloads

# TTY session recording
ttylog = true
ttylog_path = /cowrie/var/lib/cowrie/tty

# ─── SSH CONFIGURATION ────────────────────────────────────────────────────────
[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

# Realistic SSH version banner
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.4

# SSH host key — generated at first run
rsa_public_key = /cowrie/var/lib/cowrie/ssh_host_rsa_key.pub
rsa_private_key = /cowrie/var/lib/cowrie/ssh_host_rsa_key
dsa_public_key = /cowrie/var/lib/cowrie/ssh_host_dsa_key.pub
dsa_private_key = /cowrie/var/lib/cowrie/ssh_host_dsa_key
ecdsa_public_key = /cowrie/var/lib/cowrie/ssh_host_ecdsa_key.pub
ecdsa_private_key = /cowrie/var/lib/cowrie/ssh_host_ecdsa_key
ed25519_public_key = /cowrie/var/lib/cowrie/ssh_host_ed25519_key.pub
ed25519_private_key = /cowrie/var/lib/cowrie/ssh_host_ed25519_key

# Auth settings
auth_class = AuthRandom
auth_class_parameters = 1,5,50
# Allow attackers to "succeed" with reasonable probability to gather TTPs
# 50% chance of allowing any credential after 1 attempt, up to 5 attempts

# ─── TELNET CONFIGURATION ─────────────────────────────────────────────────────
[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

# ─── OUTPUT PLUGINS ───────────────────────────────────────────────────────────
[output_jsonlog]
enabled = true
logfile = /cowrie/var/log/cowrie/cowrie.json

[output_textlog]
enabled = true
logfile = /cowrie/var/log/cowrie/cowrie.log

# Elasticsearch output (Focus node)
[output_elasticsearch]
enabled = true
host = elasticsearch
port = 9200
index = darpan-cowrie-%(now)s
pipeline = cowrie

# ─── FAKE DNS ─────────────────────────────────────────────────────────────────
[shell]
# Pretend to resolve internal hostnames to bait lateral movement probing
fake_addr = 10.0.1.{1-25}
hostname_resolver = disabled

# ─── SENSOR ID ────────────────────────────────────────────────────────────────
[output_localsyslog]
enabled = false

[output_malshare]
enabled = false

# Sensor identification
[sensor]
name = darpan-reflector-01
