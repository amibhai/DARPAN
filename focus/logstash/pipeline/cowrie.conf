# DARPAN Logstash Pipeline — Cowrie Honeypot Log Processing
# Parses cowrie.json events and enriches with geoip, tagging, and ML features

input {
  beats {
    port  => 5044
    host  => "0.0.0.0"
    codec => plain
  }
}

filter {

  # ── Parse JSON body from Cowrie ──────────────────────────────────────────
  json {
    source => "message"
    target => "cowrie"
    skip_on_invalid_json => true
  }

  # Flatten top-level cowrie fields for easier indexing
  if [cowrie] {
    mutate {
      rename => {
        "[cowrie][eventid]"       => "eventid"
        "[cowrie][src_ip]"        => "src_ip"
        "[cowrie][src_port]"      => "src_port"
        "[cowrie][dst_port]"      => "dst_port"
        "[cowrie][session]"       => "session"
        "[cowrie][username]"      => "username"
        "[cowrie][password]"      => "password"
        "[cowrie][input]"         => "command"
        "[cowrie][success]"       => "auth_success"
        "[cowrie][duration]"      => "session_duration"
        "[cowrie][timestamp]"     => "cowrie_timestamp"
        "[cowrie][message]"       => "cowrie_message"
        "[cowrie][url]"           => "download_url"
        "[cowrie][shasum]"        => "file_sha256"
        "[cowrie][outfile]"       => "download_path"
        "[cowrie][sensor]"        => "sensor_id"
        "[cowrie][version]"       => "ssh_client_version"
      }
    }
  }

  # ── Timestamp normalization ───────────────────────────────────────────────
  if [cowrie_timestamp] {
    date {
      match   => ["cowrie_timestamp", "ISO8601", "UNIX_MS"]
      target  => "@timestamp"
      timezone => "UTC"
    }
  }

  # ── GeoIP enrichment ──────────────────────────────────────────────────────
  if [src_ip] and [src_ip] != "" {
    geoip {
      source        => "src_ip"
      target        => "geoip"
      add_field     => {
        "[geoip][src_country]" => "%{[geoip][country_name]}"
        "[geoip][src_city]"    => "%{[geoip][city_name]}"
      }
    }
  }

  # ── Temporal features for ML pipeline ────────────────────────────────────
  ruby {
    code => "
      ts = event.get('@timestamp')
      if ts
        event.set('hour_of_day', ts.hour)
        event.set('day_of_week', ts.wday)
        event.set('is_weekend', (ts.wday == 0 || ts.wday == 6) ? 1 : 0)
      end
    "
  }

  # ── Credential type classification ───────────────────────────────────────
  if [username] and [password] {
    # Default/common credentials
    if [username] =~ /^(root|admin|administrator|guest|test|user|pi|ubnt|support)$/ and
       [password] =~ /^(root|admin|password|123456|toor|raspberry|ubnt|guest|test)$/ {
      mutate { add_field => { "credential_type" => "default_cred" } }
    }
    # Honeytokens — unique canary credentials
    else if [username] =~ /^(prod_maint|db_rotate|sec_audit|infra_ops|backup_key)$/ {
      mutate {
        add_field => { "credential_type" => "honeytoken" }
        add_tag   => ["HONEYTOKEN_CREDENTIAL", "CRITICAL_ALERT"]
      }
    }
    # Corporate-pattern service accounts
    else if [username] =~ /^(svc_|deploy_|jenkins|gitlab|k8s_|vault_|jira_)/ {
      mutate { add_field => { "credential_type" => "service_account_attempt" } }
    }
    # Brute force — sequential or high entropy
    else {
      mutate { add_field => { "credential_type" => "brute_force" } }
    }
  }

  # ── Event type tagging ────────────────────────────────────────────────────
  if [eventid] == "cowrie.command.input" {
    mutate { add_tag => ["COMMAND_EVENT"] }

    # Recon commands
    if [command] =~ /(^|\s)(ls|cat|pwd|id|whoami|uname|ifconfig|ip addr|hostname|env|printenv|ps|netstat|ss|lsof|w\s|who\s|last\s|df |du |free |uptime|dmesg)/ {
      mutate { add_tag => ["RECON"] }
      mutate { add_field => { "ttp_hint" => "T1082" } }
    }

    # Lateral movement
    if [command] =~ /(ssh |scp |rsync |nc |netcat |ncat |python.*socket|perl.*socket|bash.*\/dev\/tcp)/ {
      mutate { add_tag => ["LATERAL_MOVEMENT"] }
      mutate { add_field => { "ttp_hint" => "T1021.004" } }
    }

    # Ingress tool transfer
    if [command] =~ /(wget |curl |fetch |tftp |ftp |scp )/ {
      mutate { add_tag => ["TOOL_TRANSFER"] }
      mutate { add_field => { "ttp_hint" => "T1105" } }
    }

    # Persistence
    if [command] =~ /(crontab|systemctl |chmod \+x|chattr|\/etc\/rc\.|\.bashrc|\.profile|at\s)/ {
      mutate { add_tag => ["PERSISTENCE"] }
      mutate { add_field => { "ttp_hint" => "T1053.003" } }
    }

    # Credential access
    if [command] =~ /(\/etc\/passwd|\/etc\/shadow|\/etc\/sudoers|\.ssh\/|id_rsa|authorized_keys|\.bash_history)/ {
      mutate { add_tag => ["CREDENTIAL_ACCESS"] }
      mutate { add_field => { "ttp_hint" => "T1003" } }
    }

    # Defense evasion
    if [command] =~ /(history -c|unset HIST|HISTFILESIZE=0|shred |srm |echo.*>.*\/var\/log|rm.*log)/ {
      mutate { add_tag => ["DEFENSE_EVASION"] }
      mutate { add_field => { "ttp_hint" => "T1070" } }
    }

    # Obfuscation — base64
    if [command] =~ /(base64|b64decode|echo.*\|.*base64|eval.*base64)/ {
      mutate { add_tag => ["OBFUSCATION"] }
      mutate { add_field => { "ttp_hint" => "T1140" } }
    }

    # Honeytoken file access
    if [command] =~ /\/opt\/app\/config\.yml/ {
      mutate {
        add_tag   => ["HONEYTOKEN_ACCESSED", "CRITICAL_ALERT"]
        add_field => { "honeytoken_type" => "config_file" }
      }
    }
  }

  if [eventid] == "cowrie.login.success" {
    mutate { add_tag => ["AUTH_EVENT", "AUTH_SUCCESS"] }
  }

  if [eventid] == "cowrie.login.failed" {
    mutate { add_tag => ["AUTH_EVENT", "AUTH_FAILED"] }
  }

  if [eventid] == "cowrie.session.file_download" {
    mutate { add_tag => ["MALWARE_EVENT"] }
  }

  if [eventid] == "cowrie.session.connect" {
    mutate { add_tag => ["SESSION_START"] }
  }

  if [eventid] == "cowrie.session.closed" {
    mutate { add_tag => ["SESSION_END"] }
  }

  # ── DARPAN node identification ────────────────────────────────────────────
  mutate {
    add_field => {
      "darpan_node"    => "reflector-01"
      "darpan_version" => "1.0"
      "data_source"    => "cowrie-honeypot"
    }
  }

  # ── Clean up intermediary fields ──────────────────────────────────────────
  mutate {
    remove_field => ["cowrie", "host", "agent", "ecs", "input", "log"]
  }

}

output {
  elasticsearch {
    hosts          => ["http://elasticsearch:9200"]
    index          => "darpan-cowrie-%{+YYYY.MM.dd}"
    document_type  => "_doc"
    manage_template => false
  }

  # Debug output — comment out in production
  # stdout { codec => rubydebug }

  # Critical alert output to file
  if "CRITICAL_ALERT" in [tags] {
    file {
      path  => "/tmp/darpan_critical_alerts.json"
      codec => json_lines
    }
  }
}
